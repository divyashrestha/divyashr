name: PBC Service Staging Deployment

on:
    push:
        branches:
            - develop
            - features/added-workflow
    workflow_dispatch:
        inputs:
            deploy:
                description: Enter 'staging' to deploy to staging
                required: true
                default: "no"

jobs:
    deploy-to-staging:
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'staging')
        name: Deploy to Staging
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: 📂 Sync files
                uses: SamKirkland/FTP-Deploy-Action@v4.3.5
                with:
                    server: ${{ secrets.ftp_host }}
                    username: ${{ secrets.ftp_username }}
                    password: ${{ secrets.ftp_password }}
                    server-dir: /divyashr.com.np/staging
                    exclude: |
                        **/.git*
                        **/.git*/**
                        .gitattributes
                        release.sh
                        Readme.md

            -   name: Execute remote SSH commands using password
                uses: appleboy/ssh-action@v1
                with:
                    host: ${{ secrets.ssh_host }}
                    username: ${{ secrets.ssh_username }}
                    password: ${{ secrets.ssh_password }}
                    #                    port: ${{ secrets.ssh_port }}
                    script: |
                        cd divyashr.com.np/staging
                        composer install
